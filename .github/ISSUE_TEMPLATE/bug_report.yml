name: Bug report
description: 向我们反馈您发现的Bug
title: "[Bug]: "
labels: ["bug"]
assignees:
  - weilinfox
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Bug现象
      placeholder: A clear and concise description of what you see. (请简洁清晰的描述一下您看到的现象)
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: 复现步骤
      placeholder: How do you trigger this bug? Please walk us through it step by step. (您是如何触发这个bug的,请描述一下步骤)
    validations:
      required: true
  - type: textarea
    id: operating_environment
    attributes:
      label: Operating Environment
      description: 运行环境
      placeholder: In what operating environment did you encounter this bug? Please specify the hardware device and operating system. (您是在什么运行环境下出现这个bug的，请描述下硬件设备型号和操作系统版本)
    validations:
      required: false
  - type: input
    id: sw_version
    attributes:
      label: Software version
      description: RuyiSDK模块及版本
      placeholder: ruyi v0.29
    validations:
      required: false
  - type: input
    id: bug_frequency
    attributes:
      label: Bug frequency
      description: Bug复现频率
      placeholder: occur 1-2 times per 10 times. (每10次出现1-2次)
    validations:
      required: false
  - type: textarea
    id: other
    attributes:
      label: Anything else
      description: 其它信息
      placeholder: |
        log or image? Anything that will give us more context about the bug. (向我们提供关于bug的任何其它信息,图片或log)
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in. (您能点击这个区域然后拖动文件来添加图片或log)
    validations:
      required: false
